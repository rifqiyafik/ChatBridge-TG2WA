version: '3.8'

services:
  baileys-api:
    build: 
      context: ./whatsapp-api
    image: tg2wa-baileys-api:latest
    container_name: baileys-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./whatsapp-api/auth_info:/app/auth_info
    environment:
      - NODE_ENV=production

  telegram-bridge:
    build: 
      context: ./telegram-bridge
    image: tg2wa-telegram-bridge:latest
    container_name: telegram-bridge
    restart: unless-stopped
    depends_on:
      - baileys-api
    volumes:
      - ./telegram-bridge/config:/app/config
      - ./telegram-bridge/logs:/app/logs
      - ./telegram-bridge/downloads:/app/downloads
      # File .session Telegram bridge disimpan di subfolder sessions/
      - ./telegram-bridge/sessions:/app/sessions

  telegram-admin-bot:
    build: 
      context: ./telegram-bridge
    image: tg2wa-telegram-bridge:latest
    container_name: telegram-admin-bot
    restart: unless-stopped
    command: python admin_bot.py
    depends_on:
      - baileys-api
    volumes:
      - ./telegram-bridge/config:/app/config
      - ./telegram-bridge/logs:/app/logs
      - ./telegram-bridge/downloads:/app/downloads
      # Berbagi folder sessions yang sama dengan telegram-bridge
      - ./telegram-bridge/sessions:/app/sessions
