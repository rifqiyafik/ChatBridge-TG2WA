version: '3.8'

services:
  baileys-api:
    build: 
      context: ./whatsapp-api
    image: tg2wa-baileys-api:latest
    container_name: baileys-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Mount direktori penyimpanan sesi agar tidak terhapus saat container direstart
      - ./whatsapp-api/auth_info:/app/auth_info
    environment:
      - NODE_ENV=production

  telegram-bridge:
    build: 
      context: ./telegram-bridge
    image: tg2wa-telegram-bridge:latest
    container_name: telegram-bridge
    restart: unless-stopped
    depends_on:
      - baileys-api
    volumes:
      # Mount konfigurasi dan data sesi lokal ke dalam container
      - ./telegram-bridge/config:/app/config
      - ./telegram-bridge/logs:/app/logs
      - ./telegram-bridge/downloads:/app/downloads
      # Mount file .session agar tidak perlu login telegram terus-menerus
      # Pastikan nama file .session sesuai dengan nama di config Anda (contoh: my_session.session)
      # Anda bisa menggunakan wildcard bind mount jika ingin me-mount seluruh folder session, 
      # tapi amannya letakkan .session di folder root Bridge.
      # Karena Docker compose agak sulit me-mount file tunggal yang belum ada, lebih baik mount folder.
      # Solusi alternatif: pindahkan file .session ke dalam folder config dan update path di kode Python Anda.
      # Untuk saat ini, kita mount file spesifik (Pastikan file ini ADA di host sebelum docker-compose up)
      - ./telegram-bridge/Test Session.session:/app/Test Session.session
